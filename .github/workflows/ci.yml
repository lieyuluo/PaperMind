name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f .env.example
          test -d src
          test -d tests
          test -d docs
