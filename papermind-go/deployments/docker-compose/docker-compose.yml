networks:
  papermind-net:
    driver: bridge

volumes:
  papermind-postgres-data:
  papermind-qdrant-data:
  papermind-minio-data:

services:
  postgresql:
    image: postgres:16-alpine
    container_name: papermind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: papermind
      POSTGRES_USER: papermind
      POSTGRES_PASSWORD: papermind
    ports:
      - "5432:5432"
    volumes:
      - papermind-postgres-data:/var/lib/postgresql/data
    networks:
      - papermind-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papermind -d papermind"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: papermind-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - papermind-qdrant-data:/qdrant/storage
    networks:
      - papermind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: papermind-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - papermind-minio-data:/data
    networks:
      - papermind-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  temporal:
    image: temporalio/auto-setup:latest
    container_name: papermind-temporal
    restart: unless-stopped
    environment:
      DB: postgresql
      POSTGRES_SEEDS: postgresql
      POSTGRES_USER: papermind
      POSTGRES_PWD: papermind
      ENABLE_SQL_FEATURES: visibility,advanced_visibility
    ports:
      - "7233:7233"
    networks:
      - papermind-net
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7233' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    container_name: papermind-temporal-ui
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8088
    ports:
      - "8088:8080"
    networks:
      - papermind-net
    depends_on:
      temporal:
        condition: service_started
